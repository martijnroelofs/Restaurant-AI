<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1A2340" />
    <link rel="manifest" href="/manifest.json" />
    <title>RoosterAI</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'DM Sans', 'Segoe UI', sans-serif; }
      input, select, button { font-family: inherit; }
      input, select { outline: none; }
      input[type=range] { height: 6px; cursor: pointer; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-thumb { background: #DDD8CC; border-radius: 99px; }
      @keyframes slideUp {
        from { opacity: 0; transform: translateX(-50%) translateY(16px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
